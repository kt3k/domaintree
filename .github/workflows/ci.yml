name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: deno fmt --check
      - run: deno lint
      - run: deno test --allow-read --allow-env
      - run: npm install
      - run: npx deno-test
